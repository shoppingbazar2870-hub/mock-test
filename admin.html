<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>ExamPro Admin Panel</title><style>:root{--bg:#f6f8ff;--card:#fff;--text:#0f172a;--muted:#64748b;--brand:#2563eb;--line:#e2e8f0;--shadow:0 15px 40px rgba(15,23,42,.1)}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Inter,system-ui,Arial;color:var(--text)}.wrap{max-width:1150px;margin:auto;padding:20px}.top{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0}.nav{max-width:1150px;margin:auto;padding:14px 20px;display:flex;justify-content:space-between;align-items:center}.btn{border:0;border-radius:12px;padding:10px 14px;font-weight:800;cursor:pointer;background:#eef2ff}.primary{background:#2563eb;color:#fff}.bad{background:#fee2e2;color:#991b1b}.good{background:#dcfce7;color:#166534}.panel,.card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:var(--shadow);margin:14px 0}input,textarea,select{width:100%;padding:12px;border:1px solid var(--line);border-radius:12px;margin:6px 0 12px;font-size:15px}label{font-size:13px;font-weight:800;color:var(--muted)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.list{display:grid;gap:12px}.item{border:1px solid var(--line);border-radius:16px;padding:14px}.hidden{display:none!important}.qrow{border:1px dashed var(--line);padding:12px;border-radius:14px;margin:10px 0}@media(max-width:800px){.grid{grid-template-columns:1fr}}</style></head><body><header class="top"><div class="nav"><b>ExamPro Admin Panel</b><div><a class="btn" href="index.html">Website</a><button class="btn bad" onclick="logout()">Logout</button></div></div></header><main class="wrap"><section id="login" class="panel"><h2>Admin Login</h2><p>Demo PIN: <b>1234</b> (change inside admin.html)</p><input id="pin" type="password" placeholder="Admin PIN"><button class="btn primary" onclick="login()">Login</button></section><section id="admin" class="hidden"><div class="grid"><div class="panel"><h2>Add / Edit Exam</h2><label>Exam Title</label><input id="title"><label>Description</label><textarea id="desc"></textarea><label>Category</label><input id="cat" placeholder="Railway / SSC / Web Development"><label>Difficulty</label><select id="diff"><option>Easy</option><option>Medium</option><option>Hard</option></select><label>Time Limit (minutes)</label><input id="time" type="number" value="10"><label>Paid Test?</label><select id="paid"><option value="false">Free</option><option value="true">Paid</option></select><h3>Question</h3><label>Question Text</label><textarea id="qtext"></textarea><label>Options (one per line)</label><textarea id="opts" placeholder="Option A&#10;Option B&#10;Option C&#10;Option D"></textarea><label>Correct Option Number (0=A,1=B,2=C,3=D)</label><input id="correct" type="number" value="0"><label>Explanation</label><textarea id="explain"></textarea><button class="btn good" onclick="addQuestion()">Add Question</button><div id="qDraft"></div><button class="btn primary" onclick="saveExam()">Save Exam</button></div><div class="panel"><h2>Data Management</h2><button class="btn primary" onclick="loadDefault()">Load exams.json</button> <button class="btn" onclick="exportJSON()">Export JSON</button> <button class="btn bad" onclick="clearLocal()">Clear Local Data</button><label>Import JSON</label><textarea id="importBox" placeholder='Paste {"tests":[...]}'></textarea><button class="btn good" onclick="importJSON()">Import</button><div class="panel"><h3>Dashboard</h3><p>Total Tests: <b id="totalTests">0</b></p><p>Total Questions: <b id="totalQuestions">0</b></p><p>Results Stored: <b id="totalResults">0</b></p></div></div></div><div class="panel"><h2>Exam List</h2><div id="examList" class="list"></div></div></section></main><script>const ADMIN_PIN='1234';let tests=[],draftQuestions=[];const $=id=>document.getElementById(id);function login(){if($('pin').value===ADMIN_PIN){localStorage.setItem('exampro_admin','1');boot()}else alert('Wrong PIN')}function logout(){localStorage.removeItem('exampro_admin');location.reload()}function boot(){if(localStorage.getItem('exampro_admin')==='1'){$('login').classList.add('hidden');$('admin').classList.remove('hidden');loadTests()}}async function loadTests(){let local=localStorage.getItem('exampro_tests');if(local)tests=JSON.parse(local);else{let r=await fetch('exams.json');let d=await r.json();tests=d.tests||[]}render()}function render(){ $('totalTests').textContent=tests.length; $('totalQuestions').textContent=tests.reduce((a,t)=>a+(t.questions?.length||0),0); $('totalResults').textContent=JSON.parse(localStorage.getItem('exampro_leader')||'[]').length; $('examList').innerHTML=tests.map((t,i)=>`<div class="item"><b>${t.title}</b><p>${t.category||''} • ${t.difficulty||''} • ${t.questions?.length||0} Questions</p><button class="btn" onclick="editExam(${i})">Edit</button> <button class="btn bad" onclick="deleteExam(${i})">Delete</button></div>`).join('')}function addQuestion(){let opts=$('opts').value.split('\n').map(x=>x.trim()).filter(Boolean);if(!$('qtext').value||opts.length<2)return alert('Question and options required');draftQuestions.push({id:'q_'+Date.now(),text:$('qtext').value,type:'single',options:opts,correctAnswer:String($('correct').value||0),explanation:$('explain').value,subject:$('cat').value});$('qtext').value=$('opts').value=$('explain').value='';renderDraft()}function renderDraft(){ $('qDraft').innerHTML=draftQuestions.map((q,i)=>`<div class="qrow"><b>${i+1}. ${q.text}</b><br><button class="btn bad" onclick="draftQuestions.splice(${i},1);renderDraft()">Remove</button></div>`).join('')}function saveExam(){if(!$('title').value||draftQuestions.length==0)return alert('Title and at least 1 question required');tests.unshift({id:'exam_'+Date.now(),title:$('title').value,description:$('desc').value,category:$('cat').value,timeLimit:Number($('time').value||10),totalMarks:draftQuestions.length,difficulty:$('diff').value,paid:$('paid').value==='true',questions:draftQuestions});localStorage.setItem('exampro_tests',JSON.stringify(tests));draftQuestions=[];['title','desc','cat'].forEach(id=>$(id).value='');renderDraft();render();alert('Exam saved')}function deleteExam(i){if(confirm('Delete this exam?')){tests.splice(i,1);localStorage.setItem('exampro_tests',JSON.stringify(tests));render()}}function editExam(i){let t=tests[i];$('title').value=t.title;$('desc').value=t.description;$('cat').value=t.category;$('time').value=t.timeLimit;$('diff').value=t.difficulty;draftQuestions=t.questions||[];tests.splice(i,1);renderDraft();render()}async function loadDefault(){localStorage.removeItem('exampro_tests');await loadTests();alert('Default exams loaded')}function exportJSON(){let blob=new Blob([JSON.stringify({version:'admin-export',tests},null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='exams-export.json';a.click()}function importJSON(){try{let d=JSON.parse($('importBox').value);tests=d.tests||d;localStorage.setItem('exampro_tests',JSON.stringify(tests));render();alert('Imported')}catch(e){alert('Invalid JSON')}}function clearLocal(){if(confirm('Clear local tests and results?')){localStorage.removeItem('exampro_tests');localStorage.removeItem('exampro_leader');loadTests()}}boot();</script></body></html>
