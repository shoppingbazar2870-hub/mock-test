<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PrepArena — Smart Exam Assistant</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,800&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#181c2b;        /* near-black navy, headings */
    --navy:#1f2a44;       /* deep navy, primary surfaces/buttons */
    --navy-2:#141b30;     /* darker navy for gradients */
    --paper:#f7f3ea;      /* warm cream page background */
    --card:#fffdf8;       /* warm white card */
    --rule:#e6dfd0;       /* warm hairline border */
    --marigold:#d98e2b;   /* accent: CTAs, xp, highlights */
    --marigold-soft:#faecd2;
    --marigold-ink:#8a5a12;
    --brick:#b6482f;      /* exam red-pen accent for margins/incorrect */
    --brick-soft:#f7e3dd;
    --green:#2f7a5c;
    --green-soft:#e1f0e9;
    --muted:#726b5c;      /* warm muted text */
  }
  html,body{ background:var(--paper); }
  body{ font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif; color:var(--ink); }
  .font-display{ font-family:'Fraunces',serif; }
  .font-mono-num{ font-family:'IBM Plex Mono',monospace; }

  /* subtle ruled-paper texture, used sparingly behind key panels */
  .ruled-paper{
    background-image: repeating-linear-gradient(to bottom, transparent 0, transparent 31px, var(--rule) 32px);
    background-position: 0 6px;
  }
  .margin-rule{ border-left:3px solid var(--brick); }

  .animate-fade-in { animation: fadeIn .35s ease-out; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(6px);} to { opacity:1; transform: translateY(0);} }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 8px; }

  .card{ background:var(--card); border:1px solid var(--rule); border-radius:16px; }
  .btn-primary{ background:var(--navy); color:#fdf9f0; font-weight:700; transition:.15s; }
  .btn-primary:hover{ background:var(--navy-2); }
  .btn-accent{ background:var(--marigold); color:#241503; font-weight:800; transition:.15s; }
  .btn-accent:hover{ filter:brightness(1.05); }
  .btn-ghost{ background:transparent; border:1px solid var(--rule); color:var(--muted); font-weight:700; }
  .btn-ghost:hover{ background:#efe9d9; }
  .tag{ font-size:10px; font-weight:800; letter-spacing:.03em; text-transform:uppercase; padding:3px 9px; border-radius:999px; }
  .tag-navy{ background:#e7eaf1; color:var(--navy); }
  .tag-marigold{ background:var(--marigold-soft); color:var(--marigold-ink); }
  .tag-green{ background:var(--green-soft); color:var(--green); }
  .tag-brick{ background:var(--brick-soft); color:var(--brick); }
  .tag-muted{ background:#eeeae0; color:var(--muted); }

  .opt-btn{ border:1px solid var(--rule); background:var(--card); }
  .opt-btn:hover{ border-color:var(--marigold); background:#fbf5e8; }
  .opt-btn.selected{ border-color:var(--navy) !important; background:#eef1f7 !important; color:var(--navy) !important; }
  .opt-check{ border:2px solid var(--rule); }
  .opt-btn.selected .opt-check{ border-color:var(--navy); background:var(--navy); color:#fff; }

  input[type=text],input[type=email],input[type=tel],select{
    background:#fffefb; border:1px solid var(--rule); color:var(--ink);
  }
  input:focus, select:focus{ outline:none; border-color:var(--marigold); box-shadow:0 0 0 3px var(--marigold-soft); }

  /* ---------- Dark mode ---------- */
  body.dark{
    --ink:#f3ede0; --navy:#3a4a72; --navy-2:#0f1422; --paper:#12141c; --card:#1b1e29;
    --rule:#2c3040; --marigold:#e0a53f; --marigold-soft:#3a2f16; --marigold-ink:#f0c471;
    --brick:#e06850; --brick-soft:#3a2020; --green:#4fbf8d; --green-soft:#173327; --muted:#a3a0b0;
  }
  body.dark input[type=text],body.dark input[type=email],body.dark input[type=tel],body.dark select{ background:#20232f; }

  /* ---------- Hamburger + Side menu ---------- */
  .hamburger-btn{ width:38px; height:38px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; border-radius:10px; border:1px solid var(--rule); background:var(--card); cursor:pointer; }
  .hamburger-btn span{ display:block; width:18px; height:2px; background:var(--ink); border-radius:2px; }

  .menu-overlay{ position:fixed; inset:0; background:rgba(10,10,15,.45); z-index:60; }
  .side-menu{ position:fixed; top:0; right:0; height:100%; width:320px; max-width:88vw; background:var(--card); z-index:61; box-shadow:-10px 0 40px rgba(0,0,0,.25); overflow-y:auto; }
  .menu-item{ width:100%; text-align:left; display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:12px; font-weight:700; font-size:13px; color:var(--ink); background:transparent; border:1px solid transparent; }
  .menu-item:hover{ background:var(--paper); border-color:var(--rule); }
  .menu-icon{ width:32px; height:32px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:15px; background:var(--paper); flex-shrink:0; }

  .toggle-switch{ width:42px; height:24px; border-radius:999px; background:var(--rule); position:relative; cursor:pointer; transition:.2s; flex-shrink:0; }
  .toggle-switch.on{ background:var(--marigold); }
  .toggle-switch .knob{ position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%; background:#fff; transition:.2s; box-shadow:0 1px 3px rgba(0,0,0,.3); }
  .toggle-switch.on .knob{ left:20px; }

  /* ---------- Modal ---------- */
  .modal-overlay{ position:fixed; inset:0; background:rgba(10,10,15,.5); z-index:70; display:flex; align-items:center; justify-content:center; padding:16px; }
  .modal-box{ background:var(--card); border-radius:18px; max-width:520px; width:100%; max-height:85vh; overflow-y:auto; padding:26px; position:relative; border:1px solid var(--rule); }
  .modal-close{ position:absolute; top:14px; right:14px; width:30px; height:30px; border-radius:9px; background:var(--paper); border:1px solid var(--rule); color:var(--muted); font-weight:700; }
</style>
</head>
<body class="min-h-screen">
<div id="root"></div>

<script>
/* =========================================================
   PrepArena — single-file vanilla JS build
   (Converted from the original React/TypeScript source)
   ========================================================= */

// ---------- Default Test Data ----------
// Exam/test data now lives in an external exams.json file (kept alongside this HTML file)
// so new exams can be added just by editing that JSON — no need to touch this script.
const EXAMS_JSON_URL = "./exams.json";

// Small built-in fallback (used only if exams.json can't be fetched, e.g. this file was
// opened directly by double-clicking instead of being served from a local/web server).
const FALLBACK_TESTS = [{"id": "web-dev-1", "title": "React & Modern Web Development", "description": "Test your understanding of modern React (v18/19), JSX behavior, hooks execution order, concurrent rendering, and general browser event loop mechanics.", "category": "Web Development", "timeLimit": 10, "totalMarks": 20, "difficulty": "Medium", "questions": [{"id": "wd_q1", "text": "In React 18+, which hook is used to mark a state update as non-blocking transition, allowing the user interface to remain responsive during heavy rendering?", "type": "single", "options": ["useDeferredValue", "useTransition", "useId", "useLayoutEffect"], "correctAnswer": "1", "explanation": "useTransition is a React Hook that lets you update the state without blocking the UI. It returns an isPending flag and a startTransition function. useDeferredValue does a similar job but is passed a value instead of wrapping the update function.", "subject": "React Core"}, {"id": "wd_q2", "text": "What is the primary difference between useEffect and useLayoutEffect in React?", "type": "single", "options": ["useEffect is only for server-side rendering while useLayoutEffect is for client-side rendering.", "useEffect fires asynchronously AFTER the browser has completed layout and paint. useLayoutEffect fires synchronously BEFORE the browser paints the screen.", "useEffect runs on every render, whereas useLayoutEffect runs only on mount.", "useEffect cannot access DOM nodes, while useLayoutEffect can access DOM nodes directly."], "correctAnswer": "1", "explanation": "useEffect is deferred and runs asynchronously after the paint, making it suitable for API calls or subscriptions. useLayoutEffect runs synchronously immediately after DOM mutations but BEFORE the browser paints.", "subject": "React Hooks"}, {"id": "wd_q3", "text": "Which of the following statements about the JavaScript Event Loop are correct? (Select all that apply)", "type": "multiple", "options": ["Promises callbacks (microtasks) have higher priority than setTimeout callbacks (macrotasks).", "The event loop is blocked when a synchronous heavy loop is running on the main thread.", "All microtasks queue must be cleared before the event loop proceeds to the next macrotask.", "Web Workers run on the same thread as the event loop and can directly access the DOM."], "correctAnswer": "0,1,2", "explanation": "Microtasks have higher priority than macrotasks; heavy sync work blocks the main thread; the microtask queue is drained fully before the next macrotask; Web Workers run on separate threads and cannot touch the DOM directly.", "subject": "JavaScript Runtime"}, {"id": "wd_q4", "text": "Evaluate the output of 'typeof NaN' in JavaScript.", "type": "single", "options": ["\"NaN\"", "\"undefined\"", "\"number\"", "\"object\""], "correctAnswer": "2", "explanation": "NaN is technically a numeric data type, so typeof NaN returns \"number\".", "subject": "JavaScript Basics"}, {"id": "wd_q5", "text": "What is the result of 1 + 2 + '3' + 4 in JavaScript?", "type": "single", "options": ["\"1234\"", "\"334\"", "10", "\"64\""], "correctAnswer": "1", "explanation": "1 + 2 = 3 (number). 3 + '3' coerces to string '33'. '33' + 4 = '334'.", "subject": "JavaScript Operations"}]}, {"id": "jee-phys-1", "title": "JEE Main Physics: Kinematics & Laws of Motion", "description": "Highly focused practice test covering Newton's Laws, Friction, Circular Motion, and Projectile equations. Perfect for engineering candidates.", "category": "JEE Prep", "timeLimit": 15, "totalMarks": 20, "difficulty": "Hard", "questions": [{"id": "phy_q1", "text": "A projectile is thrown from the ground with an initial velocity of 20 m/s at an angle of 30 degrees with the horizontal. Taking g = 10 m/s\u00b2, what is the total flight time of the projectile in seconds?", "type": "numerical", "correctAnswer": "2", "explanation": "T = (2\u00b7u\u00b7sin\u03b8)/g = (2\u00b720\u00b70.5)/10 = 2 seconds.", "subject": "Kinematics"}, {"id": "phy_q2", "text": "A block of mass 5 kg is lying on a rough horizontal surface with coefficient of static friction \u03bc_s = 0.4 and coefficient of kinetic friction \u03bc_k = 0.3. A horizontal force of 15 N is applied to the block. Taking g = 10 m/s\u00b2, what is the frictional force (in Newtons) acting on the block?", "type": "numerical", "correctAnswer": "15", "explanation": "Max static friction = 0.4\u00d75\u00d710 = 20N. Applied force (15N) < max static friction, so block stays still and friction exactly balances the applied force: 15N.", "subject": "Laws of Motion"}, {"id": "phy_q3", "text": "Which of the following statements are correct regarding conservative and non-conservative forces? (Select all that apply)", "type": "multiple", "options": ["The work done by a conservative force in a closed loop is always zero.", "Frictional force and viscous force are examples of conservative forces.", "A conservative force can be expressed as negative gradient of a potential energy function.", "The work done by a conservative force depends only on the initial and final positions of the body."], "correctAnswer": "0,2,3", "explanation": "Friction and viscous force are NON-conservative (they dissipate energy); the other three statements are true of conservative forces.", "subject": "Work, Energy & Power"}, {"id": "phy_q4", "text": "A particle is moving in a circle of radius 10m with a constant tangential speed of 10 m/s. What is the magnitude of its centripetal acceleration in m/s\u00b2?", "type": "numerical", "correctAnswer": "10", "explanation": "a_c = v\u00b2/r = 100/10 = 10 m/s\u00b2.", "subject": "Circular Motion"}, {"id": "phy_q5", "text": "A body of mass 2 kg falls freely from a height of 10 m under gravity. Taking g = 10 m/s\u00b2 and neglecting air resistance, what is its kinetic energy in Joules just before striking the ground?", "type": "numerical", "correctAnswer": "200", "explanation": "KE gained = PE lost = m\u00b7g\u00b7h = 2\u00d710\u00d710 = 200 J.", "subject": "Conservation of Energy"}]}];

let testsDataSource = "fallback"; // "json" | "cache" | "fallback" — used to show a status note

async function loadTestsData() {
  // Seed instantly from whatever we have cached, so the UI never looks empty.
  state.tests = store.get("mock_tests_list", FALLBACK_TESTS);
  testsDataSource = state.tests === FALLBACK_TESTS ? "fallback" : "cache";
  try {
    const res = await fetch(EXAMS_JSON_URL, { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    if (!data || !Array.isArray(data.tests)) throw new Error("exams.json has an unexpected shape");
    const cachedVersion = localStorage.getItem("mock_tests_data_version");
    if (cachedVersion !== data.version) {
      store.set("mock_tests_list", data.tests);
      localStorage.setItem("mock_tests_data_version", data.version);
    }
    state.tests = store.get("mock_tests_list", data.tests);
    testsDataSource = "json";
  } catch (e) {
    console.warn("PrepArena: couldn't load exams.json, falling back to cached/sample test data.", e);
  }
}

const BADGES = {
  first_blood: { title:"First Blood", desc:"Completed your first mock exam.", icon:"🎯" },
  accuracy_champ: { title:"Accuracy Champion", desc:"Scored 85%+ accuracy in an exam.", icon:"🏆" }
};

const LEADERBOARD_SEED = [
  { rank:1, name:"Pranjal Dubey", exam:"UPSC Prep", xp:2450 },
  { rank:2, name:"Sanya Malhotra", exam:"JEE Prep", xp:2180 },
  { rank:3, name:"Amit Verma", exam:"NEET Prep", xp:1980 },
  { rank:4, name:"Tanya Sen", exam:"SSC CGL Prep", xp:1750 },
  { rank:5, name:"Aarav Gupta", exam:"Class 10 Prep", xp:1620 },
  { rank:6, name:"Neha Roy", exam:"NTPC Prep", xp:1450 }
];

// ---------- i18n ----------
const translations = {
  en: {
    practiceArena:"Practice Arena", leaderboardRewards:"Leaderboard & Rewards", logout:"Log out",
    menu:"Menu", profile:"Profile", nightMode:"Night Mode", bookmarks:"Saved Questions",
    points:"Points", language:"Change Language", privacy:"Privacy Policy", close:"Close",
    footer:"Practice smart, achieve success.", yourPoints:"Your Points", yourXp:"Your XP",
    targetExam:"Target Exam", email:"Email", phone:"Phone", noBookmarks:"No questions bookmarked yet. Tap the 🔖 icon on any question during a test to save it here.",
    fromTest:"From test"
  },
  bn: {
    practiceArena:"প্র্যাকটিস অ্যারেনা", leaderboardRewards:"লিডারবোর্ড ও রিওয়ার্ড", logout:"লগ আউট",
    menu:"মেনু", profile:"প্রোফাইল", nightMode:"নাইট মোড", bookmarks:"সেভ করা প্রশ্ন",
    points:"পয়েন্ট", language:"ভাষা পরিবর্তন", privacy:"প্রাইভেসি পলিসি", close:"বন্ধ করুন",
    footer:"স্মার্টভাবে অনুশীলন করুন, সাফল্য অর্জন করুন।", yourPoints:"আপনার পয়েন্ট", yourXp:"আপনার XP",
    targetExam:"টার্গেট পরীক্ষা", email:"ইমেইল", phone:"ফোন", noBookmarks:"এখনও কোনো প্রশ্ন সেভ করা হয়নি। টেস্ট চলাকালীন যেকোনো প্রশ্নে 🔖 আইকনে ট্যাপ করে এখানে সেভ করুন।",
    fromTest:"টেস্ট থেকে"
  },
  hi: {
    practiceArena:"प्रैक्टिस एरिना", leaderboardRewards:"लीडरबोर्ड और रिवॉर्ड", logout:"लॉग आउट",
    menu:"मेनू", profile:"प्रोफ़ाइल", nightMode:"नाइट मोड", bookmarks:"सेव किए प्रश्न",
    points:"पॉइंट्स", language:"भाषा बदलें", privacy:"गोपनीयता नीति", close:"बंद करें",
    footer:"स्मार्ट तरीके से अभ्यास करें, सफलता पाएं।", yourPoints:"आपके पॉइंट्स", yourXp:"आपका XP",
    targetExam:"लक्ष्य परीक्षा", email:"ईमेल", phone:"फ़ोन", noBookmarks:"अभी तक कोई प्रश्न सेव नहीं किया गया। टेस्ट के दौरान किसी भी प्रश्न पर 🔖 आइकन दबाकर उसे यहाँ सेव करें।",
    fromTest:"टेस्ट से"
  }
};
function tr(key) {
  const lang = state.language || "en";
  return (translations[lang] && translations[lang][key]) || translations.en[key] || key;
}

// ---------- Storage helpers ----------
const store = {
  get(key, fallback) {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
    catch (e) { return fallback; }
  },
  set(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
};

// ---------- App State ----------
const state = {
  view: "dashboard", // dashboard | testPreview | activeTest | analysis | rewardsHub
  tests: [], // populated asynchronously by loadTestsData() from exams.json before first render
  history: store.get("mock_exam_history", []),
  profile: store.get("preparena_user_profile", null),
  currentTest: null,
  session: null,
  timerId: null,
  searchQuery: "",
  selectedCategory: "All Exam",
  selectedDifficulty: "All",
  menuOpen: false,
  modal: null, // null | "profile" | "bookmarks" | "privacy"
  darkMode: store.get("preparena_dark_mode", false),
  language: store.get("preparena_language", "en"),
  bookmarks: store.get("preparena_bookmarks", []) // [{testId,testTitle,questionId,questionText}]
};

const root = document.getElementById("root");

function render() {
  document.body.classList.toggle("dark", !!state.darkMode);

  if (!state.profile) { root.innerHTML = OnboardingView(); attachOnboardingEvents(); return; }

  root.innerHTML = `
    ${Header()}
    <main class="flex-1 pb-16">
      ${state.view === "dashboard" ? DashboardView() : ""}
      ${state.view === "selectExamType" ? SelectExamTypeView() : ""}
      ${state.view === "chooseTest" ? ChooseTestView() : ""}
      ${state.view === "testPreview" ? TestPreviewView() : ""}
      ${state.view === "activeTest" ? ActiveTestView() : ""}
      ${state.view === "analysis" ? AnalysisView() : ""}
      ${state.view === "rewardsHub" ? RewardsView() : ""}
    </main>
    <footer class="border-t py-6 text-center text-xs font-medium mt-auto" style="border-color:var(--rule); color:var(--muted);">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <p>© ${new Date().getFullYear()} PrepArena • ${tr("footer")}</p>
      </div>
    </footer>
    ${state.menuOpen ? SideMenu() : ""}
    ${state.modal ? Modal() : ""}
  `;
  attachGlobalEvents();
  if (state.view === "dashboard") attachDashboardEvents();
  if (state.view === "selectExamType") attachSelectExamTypeEvents();
  if (state.view === "chooseTest") attachChooseTestEvents();
  if (state.view === "testPreview") attachTestPreviewEvents();
  if (state.view === "activeTest") attachActiveTestEvents();
  if (state.view === "analysis") attachAnalysisEvents();
  if (state.view === "rewardsHub") attachRewardsEvents();
  if (state.menuOpen) attachSideMenuEvents();
  if (state.modal) attachModalEvents();
}

// ---------- Onboarding ----------
function OnboardingView() {
  const today = new Date().toLocaleDateString("en-IN", { day:"2-digit", month:"short", year:"numeric" });
  return `
  <div class="min-h-screen flex items-center justify-center p-4 sm:p-8" style="background:radial-gradient(1200px 600px at 15% -10%, #24304f 0%, var(--navy-2) 55%, var(--ink) 100%);">
    <div class="max-w-4xl w-full grid grid-cols-1 md:grid-cols-5 rounded-[20px] overflow-hidden shadow-2xl animate-fade-in" style="box-shadow:0 30px 80px -20px rgba(0,0,0,.5);">

      <!-- Left: Admit-card style brand panel -->
      <div class="md:col-span-2 p-8 sm:p-10 text-[#f3ede0] flex flex-col justify-between" style="background:linear-gradient(160deg,var(--navy) 0%,var(--navy-2) 100%);">
        <div>
          <div class="flex items-center gap-2.5 mb-10">
            <div class="w-9 h-9 rounded-lg flex items-center justify-center font-display font-bold text-lg" style="background:var(--marigold); color:#241503;">P</div>
            <div>
              <span class="font-display font-semibold text-base block leading-tight">PrepArena</span>
              <span class="text-[10px] uppercase tracking-[0.15em] opacity-60 block">Smart Exam Assistant</span>
            </div>
          </div>
          <p class="text-[10px] uppercase tracking-[0.2em] opacity-50 mb-2">Candidate Admit Card</p>
          <h1 class="font-display text-3xl sm:text-[2.15rem] leading-[1.15] font-semibold mb-4">Let's set up<br/>your profile.</h1>
          <p class="text-sm opacity-70 leading-relaxed max-w-xs">Tell us a little about yourself so we can personalize your practice arena, mock papers, and rankings.</p>
        </div>

        <div class="mt-10 pt-6 border-t border-white/10 space-y-3 font-mono-num text-[11px] opacity-70">
          <div class="flex justify-between"><span>ISSUE DATE</span><span>${today}</span></div>
          <div class="flex justify-between"><span>VALID FOR</span><span>JEE · NEET · UPSC · SSC</span></div>
          <div class="flex justify-between"><span>STORAGE</span><span>LOCAL BROWSER ONLY</span></div>
        </div>
      </div>

      <!-- Right: Ruled answer-sheet form panel -->
      <div class="md:col-span-3 bg-[var(--card)] p-8 sm:p-10 ruled-paper">
        <form id="onboard_form" class="space-y-4 pl-4 margin-rule">
          <div>
            <label class="block text-[11px] font-bold uppercase tracking-wide mb-1" style="color:var(--muted);">01 · Full Name</label>
            <input required name="name" type="text" placeholder="e.g. Suman Sen" class="w-full px-3 py-2 rounded-lg text-sm" />
          </div>
          <div>
            <label class="block text-[11px] font-bold uppercase tracking-wide mb-1" style="color:var(--muted);">02 · Email</label>
            <input required name="email" type="email" placeholder="you@example.com" class="w-full px-3 py-2 rounded-lg text-sm" />
          </div>
          <div>
            <label class="block text-[11px] font-bold uppercase tracking-wide mb-1" style="color:var(--muted);">03 · Phone</label>
            <input required name="phone" type="tel" placeholder="+91 90000 00000" class="w-full px-3 py-2 rounded-lg text-sm" />
          </div>
          <div>

function attachGlobalEvents() {
  root.querySelectorAll("[data-nav]").forEach(btn => btn.addEventListener("click", () => {
    state.view = btn.dataset.nav; render();
  }));
  root.querySelectorAll("[data-goto-step]").forEach(btn => btn.addEventListener("click", () => {
    const step = Number(btn.dataset.gotoStep);
    let targetView;
    if (step === 2) {
      targetView = "selectExamType";
    } else if (step === 3) {
      targetView = (state.selectedCategory && state.selectedCategory !== "All Exam") ? "chooseTest" : "selectExamType";
    } else if (step === 4) {
      if (state.session && state.session.status === "running") targetView = "activeTest";
      else if (state.currentTest) targetView = "testPreview";
      else targetView = "selectExamType";
    } else if (step === 5 || step === 6) {
      if (state.session && state.session.score) targetView = "analysis";
      else if (state.session && state.session.status === "running") targetView = "activeTest";
      else if (state.currentTest) targetView = "testPreview";
      else targetView = "selectExamType";
    } else if (step === 7 || step === 8) {
      targetView = "rewardsHub";
    }
    if (state.view === "activeTest" && targetView !== "activeTest" && state.session && state.session.status === "running") {
      if (!confirm("You have an exam in progress. Leaving now will lose your current progress. Continue?")) return;
      clearInterval(state.timerId); state.session = null; state.currentTest = null;
    }
    state.view = targetView;
    state.menuOpen = false;
    render();
  }));
  const logout = document.getElementById("btn_logout");
  if (logout) logout.addEventListener("click", () => {
    if (confirm("Are you sure you want to log out of your classroom desk?")) {
      localStorage.removeItem("preparena_user_profile");
      state.profile = null; state.view = "dashboard"; render();
    }
  });
  const openMenu = document.getElementById("btn_open_menu");
  if (openMenu) openMenu.addEventListener("click", () => { state.menuOpen = true; render(); });
}

// ---------- Active Test ----------
function startTimer() {
  clearInterval(state.timerId);
  state.timerId = setInterval(() => {
    if (!state.session) return;
    state.session.timeRemaining -= 1;
    if (state.session.timeRemaining <= 0) {
      clearInterval(state.timerId);
      submitExam();
      return;
    }
    const el = document.getElementById("timer_display");
    if (el) el.textContent = formatTime(state.session.timeRemaining);
  }, 1000);
}
function formatTime(sec) {
  const m = Math.floor(sec / 60), s = sec % 60;
  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}
function ActiveTestView() {
  const t = state.currentTest, sess = state.session;

  const idx = state.activeQIndex || 0;

  const answeredCount = Object.keys(sess.answers).filter(k => {
    const a = sess.answers[k];
    return a.selectedOption !== undefined || (a.selectedOptions && a.selectedOptions.length) || (a.numericalValue !== undefined && a.numericalValue.trim() !== "");
  }).length;

  return `

    ${StepIndicator([4])}

    </div>

    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
      <div class="lg:col-span-3 card p-6">
        <div class="flex items-center gap-2 mb-3 justify-between">
          <div class="flex items-center gap-2">
            <span class="tag tag-navy">${q.subject || t.category}</span>
            <span class="tag tag-muted">${q.type}</span>
          </div>
          <button id="btn_toggle_bookmark" title="${tr('bookmarks')}" class="text-lg leading-none">${state.bookmarks.some(b=>b.questionId===q.id) ? "🔖" : "🏷️"}</button>
        </div>
        <p class="text-sm font-semibold mb-5 whitespace-pre-line" style="color:var(--ink);">${q.text}</p>

        ${q.type === "numerical" ? `
        <input id="numerical_input" type="text" inputmode="decimal" placeholder="Enter your numeric answer"
          value="${ans.numericalValue || ""}"
          class="w-full px-4 py-3 rounded-xl text-sm font-bold font-mono-num" />
        ` : `
        <div class="space-y-2.5">
          ${q.options.map((opt, i) => {
            const isSelectedSingle = ans.selectedOption === String(i);
            const isSelectedMulti = (ans.selectedOptions || []).includes(String(i));
            const selected = q.type === "single" ? isSelectedSingle : isSelectedMulti;
            return `
            <button data-option-idx="${i}" class="opt-btn ${selected ? "selected" : ""} w-full text-left px-4 py-3 rounded-xl text-sm font-medium transition-colors flex items-center gap-3" style="color:var(--ink);">
              <span class="opt-check w-5 h-5 shrink-0 rounded-${q.type==='single'?'full':'md'} flex items-center justify-center text-[10px]">${selected ? "✓" : ""}</span>
              ${opt}
            </button>`;
          }).join("")}
        </div>`}

        <div class="flex justify-between items-center mt-6 pt-4 border-t" style="border-color:var(--rule);">
          <button id="btn_mark_review" class="text-xs font-bold" style="color:${ans.isMarkedForReview ? "var(--marigold-ink)" : "var(--muted)"};">🚩 ${ans.isMarkedForReview ? "Marked for review" : "Mark for review"}</button>
          <div class="flex gap-2">
            <button id="btn_prev_q" ${idx===0?"disabled":""} class="btn-ghost px-4 py-2 text-xs rounded-lg disabled:opacity-30">← Previous</button>
            ${idx === t.questions.length - 1
              ? `<button id="btn_submit_exam" class="px-4 py-2 text-xs font-bold rounded-lg" style="background:var(--green); color:#fff;">Submit Exam ✓</button>`
              : `<button id="btn_next_q" class="btn-primary px-4 py-2 text-xs rounded-lg">Next →</button>`}

function updateCurrentAnswer(patch) {
  const t = state.currentTest, sess = state.session;
  const idx = state.activeQIndex || 0;
  const q = t.questions[idx];
  const current = sess.answers[q.id] || { questionId: q.id, isMarkedForReview: false, timeSpent: 0 };
  sess.answers[q.id] = { ...current, ...patch };
}
function attachActiveTestEvents() {
  root.querySelectorAll("[data-option-idx]").forEach(btn => btn.addEventListener("click", () => {
    const t = state.currentTest;
    const q = t.questions[state.activeQIndex || 0];
    const i = btn.dataset.optionIdx;
    if (q.type === "single") {
      updateCurrentAnswer({ selectedOption: i });
    } else {
      const sess = state.session;
      const current = sess.answers[q.id] || {};
      let list = current.selectedOptions ? [...current.selectedOptions] : [];
      if (list.includes(i)) list = list.filter(x => x !== i); else list.push(i);
      updateCurrentAnswer({ selectedOptions: list });
    }
    render();
  }));
  const numInput = document.getElementById("numerical_input");
  if (numInput) numInput.addEventListener("input", (e) => { updateCurrentAnswer({ numericalValue: e.target.value }); });

  const bookmarkBtn = document.getElementById("btn_toggle_bookmark");
  if (bookmarkBtn) bookmarkBtn.addEventListener("click", () => {
    const tst = state.currentTest, q = tst.questions[state.activeQIndex || 0];
    const exists = state.bookmarks.some(b => b.questionId === q.id);
    if (exists) {
      state.bookmarks = state.bookmarks.filter(b => b.questionId !== q.id);
    } else {
      state.bookmarks = [...state.bookmarks, { testId: tst.id, testTitle: tst.title, questionId: q.id, questionText: q.text }];
    }
    store.set("preparena_bookmarks", state.bookmarks);
    render();
  });

  const markBtn = document.getElementById("btn_mark_review");
  if (markBtn) markBtn.addEventListener("click", () => {
    const t = state.currentTest, q = t.questions[state.activeQIndex || 0];
    const current = state.session.answers[q.id] || { questionId: q.id, isMarkedForReview: false, timeSpent: 0 };
    updateCurrentAnswer({ isMarkedForReview: !current.isMarkedForReview });
    render();
  });

  const prevBtn = document.getElementById("btn_prev_q");
  if (prevBtn) prevBtn.addEventListener("click", () => { state.activeQIndex = Math.max(0, (state.activeQIndex||0)-1); render(); });
  const nextBtn = document.getElementById("btn_next_q");
  if (nextBtn) nextBtn.addEventListener("click", () => { state.activeQIndex = (state.activeQIndex||0)+1; render(); });
  root.querySelectorAll("[data-goto-q]").forEach(btn => btn.addEventListener("click", () => { state.activeQIndex = Number(btn.dataset.gotoQ); render(); }));

  const submitBtn = document.getElementById("btn_submit_exam");
  if (submitBtn) submitBtn.addEventListener("click", () => {
    if (confirm("Are you sure you want to submit the exam?")) submitExam();
  });
  const quitBtn = document.getElementById("btn_quit_exam");
  if (quitBtn) quitBtn.addEventListener("click", () => {
    if (confirm("Are you sure you want to quit? Your current progress will be lost.")) {
      clearInterval(state.timerId);
      state.session = null; state.currentTest = null; state.view = "dashboard"; render();
    }
  });
}

function checkAnswerCorrectness(q, ans) {
  if (!ans) return false;
  if (q.type === "single") return ans.selectedOption === String(q.correctAnswer);
  if (q.type === "multiple") {
    const userSel = ans.selectedOptions || [];
    const correct = String(q.correctAnswer).split(",").map(x => x.trim()).sort();
    if (userSel.length !== correct.length) return false;
    const userSorted = [...userSel].sort();
    return userSorted.every((v,i) => v === correct[i]);
  }
  if (q.type === "numerical") {
    if (!ans.numericalValue) return false;
    const uNum = parseFloat(ans.numericalValue), cNum = parseFloat(String(q.correctAnswer));
    if (isNaN(uNum) || isNaN(cNum)) return ans.numericalValue.trim() === String(q.correctAnswer).trim();
    return Math.abs(uNum - cNum) < 0.01;
  }
  return false;
}
function submitExam() {
  clearInterval(state.timerId);
  const t = state.currentTest, sess = state.session;
  let correctCount=0, incorrectCount=0, unansweredCount=0, totalObtained=0;
  t.questions.forEach(q => {
    const ans = sess.answers[q.id];
    const isAnswered = ans && (ans.selectedOption !== undefined || (ans.selectedOptions && ans.selectedOptions.length>0) || (ans.numericalValue !== undefined && ans.numericalValue.trim() !== ""));
    if (!isAnswered) { unansweredCount++; return; }
    if (checkAnswerCorrectness(q, ans)) { correctCount++; totalObtained += 4; }
    else { incorrectCount++; if (q.type !== "numerical") totalObtained -= 1; }
  });
  const maxMarks = t.questions.length * 4;
  const attempted = t.questions.length - unansweredCount;
  const accuracy = attempted > 0 ? Math.round((correctCount/attempted)*100) : 0;
  const percentage = Math.max(0, Math.round((totalObtained/maxMarks)*100));

  const finalSession = { ...sess, status:"submitted", submittedAt:new Date().toISOString(),
    score:{ obtained:totalObtained, total:maxMarks, correctCount, incorrectCount, unansweredCount, accuracy, percentage } };

  state.history = [finalSession, ...state.history];
  store.set("mock_exam_history", state.history);

  const p = state.profile;
  const gainedXp = (correctCount*15)+50;
  const gainedPoints = (correctCount*5)+10;
  const newBadges = [...p.badges];
  if (!newBadges.includes("first_blood")) newBadges.push("first_blood");
  if (accuracy >= 85 && !newBadges.includes("accuracy_champ")) newBadges.push("accuracy_champ");
  state.profile = { ...p, streak:p.streak+1, xp:p.xp+gainedXp, points:p.points+gainedPoints, badges:newBadges };
  store.set("preparena_user_profile", state.profile);

  state.session = finalSession;
  state.view = "analysis";
  render();
}

// ---------- Analysis ----------
function AnalysisView() {
  const t = state.currentTest, sess = state.session;
  if (!t || !sess || !sess.score) return "";
  const sc = sess.score;
  return `
  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-10 animate-fade-in">
    ${StepIndicator([5,6])}
    <div class="card p-8 mb-6 text-center">
      <p class="text-xs font-bold uppercase tracking-wider mb-1" style="color:var(--muted);">${t.title}</p>
      <h1 class="font-display text-5xl font-bold mb-1" style="color:var(--ink);">${sc.percentage}%</h1>
      <p class="text-sm mb-6" style="color:var(--muted);">Score: ${sc.obtained} / ${sc.total} marks</p>
      <div class="grid grid-cols-3 gap-4 max-w-md mx-auto">
        <div class="p-3 rounded-xl tag-green"><p class="font-mono-num text-lg font-black">${sc.correctCount}</p><p class="text-[10px] font-bold uppercase">Correct</p></div>
        <div class="p-3 rounded-xl tag-brick"><p class="font-mono-num text-lg font-black">${sc.incorrectCount}</p><p class="text-[10px] font-bold uppercase">Incorrect</p></div>
        <div class="p-3 rounded-xl tag-muted"><p class="font-mono-num text-lg font-black">${sc.unansweredCount}</p><p class="text-[10px] font-bold uppercase">Unanswered</p></div>
      </div>
      <p class="text-xs mt-4" style="color:var(--muted);">Accuracy on attempted questions: <strong style="color:var(--ink);">${sc.accuracy}%</strong></p>
      <div class="flex justify-center gap-3 mt-6">
        <button id="btn_back_to_dash" class="btn-ghost px-5 py-2.5 text-xs rounded-lg">← Back to Dashboard</button>
        <button id="btn_retake" class="btn-primary px-5 py-2.5 text-xs rounded-lg">Retake Test ↻</button>
      </div>
    </div>

    <h2 class="font-display text-base font-semibold mb-3" style="color:var(--ink);">Detailed Question Review</h2>
    <div class="space-y-4">
      ${t.questions.map((q, i) => {
        const ans = sess.answers[q.id] || {};
        const isCorrect = checkAnswerCorrectness(q, ans);
        const isAnswered = ans.selectedOption !== undefined || (ans.selectedOptions && ans.selectedOptions.length>0) || (ans.numericalValue !== undefined && ans.numericalValue.trim() !== "");
        return `
        <div class="card p-5" style="border-left:3px solid ${!isAnswered ? "var(--rule)" : isCorrect ? "var(--green)" : "var(--brick)"};">
          <div class="flex items-center gap-2 mb-2">
            <span class="tag ${!isAnswered ? "tag-muted" : isCorrect ? "tag-green" : "tag-brick"}">${!isAnswered ? "Unanswered" : isCorrect ? "Correct" : "Incorrect"}</span>
            <span class="text-[10px] font-bold uppercase font-mono-num" style="color:var(--muted);">Q${i+1} • ${q.subject || ""}</span>
          </div>
          <p class="text-sm font-semibold mb-3 whitespace-pre-line" style="color:var(--ink);">${q.text}</p>
          ${q.type !== "numerical" ? `
          <div class="space-y-1.5 mb-3">
            ${q.options.map((opt, oi) => {
              const correctSet = String(q.correctAnswer).split(",").map(x=>x.trim());
              const isThisCorrect = correctSet.includes(String(oi));
              const userPicked = q.type === "single" ? ans.selectedOption === String(oi) : (ans.selectedOptions||[]).includes(String(oi));
              let style = "border-color:var(--rule); color:var(--muted);";
              if (isThisCorrect) style = "border-color:var(--green); background:var(--green-soft); color:var(--green); font-weight:600;";
              else if (userPicked && !isThisCorrect) style = "border-color:var(--brick); background:var(--brick-soft); color:var(--brick); font-weight:600;";
              return `<div class="px-3 py-2 border rounded-lg text-xs" style="${style}">${opt} ${isThisCorrect ? "✓" : (userPicked ? "✗" : "")}</div>`;
            }).join("")}
          </div>` : `
          <div class="flex gap-3 mb-3 text-xs">
            <div class="px-3 py-2 rounded-lg" style="background:var(--paper);">Your answer: <strong>${ans.numericalValue || "—"}</strong></div>
            <div class="px-3 py-2 rounded-lg tag-green">Correct answer: <strong>${q.correctAnswer}</strong></div>
          </div>`}
          <div class="p-3 rounded-lg text-xs leading-relaxed" style="background:#eef1f7; color:var(--navy);">💡 ${q.explanation}</div>
        </div>`;
      }).join("")}
    </div>
  </div>`;
}
function attachAnalysisEvents() {
  document.getElementById("btn_back_to_dash").addEventListener("click", () => {
    state.currentTest = null; state.session = null; state.view = "dashboard"; render();
  });
  document.getElementById("btn_retake").addEventListener("click", () => {
    state.view = "testPreview"; render();
  });
}

// ---------- Rewards / Leaderboard ----------
function RewardsView() {
  const p = state.profile;
  const leaderboard = store.get("preparena_sim_leaderboard", LEADERBOARD_SEED);
  const combined = [...leaderboard, { rank:0, name: p.name + " (You)", exam: p.targetExam, xp: p.xp, isUser:true }]
    .sort((a,b) => b.xp - a.xp).map((e,i) => ({ ...e, rank: i+1 }));

  return `
  <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10 animate-fade-in">
    ${StepIndicator([7,8])}
    <h1 class="font-display text-2xl font-semibold mb-1" style="color:var(--ink);">Leaderboard & Rewards</h1>
    <p class="text-sm mb-8" style="color:var(--muted);">Track your XP ranking and unlocked achievement badges.</p>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <div class="lg:col-span-2 card p-6">
        <h2 class="font-display text-base font-semibold mb-4" style="color:var(--ink);">🏆 National Leaderboard</h2>
        <div class="space-y-2">
          ${combined.map(e => `
          <div class="p-3 rounded-xl flex items-center justify-between text-xs" style="${e.isUser ? "background:#eef1f7; border:1px solid var(--navy);" : "background:var(--paper); border:1px solid var(--rule);"}">
            <div class="flex items-center gap-3">
              <span class="w-6 h-6 rounded-full font-black flex items-center justify-center text-[10px] font-mono-num" style="${e.rank<=3 ? "background:var(--marigold-soft); color:var(--marigold-ink);" : "background:#eeeae0; color:var(--muted);"}">#${e.rank}</span>
              <div><h4 class="font-bold" style="color:${e.isUser ? "var(--navy)" : "var(--ink)"};">${e.name}</h4><span class="text-[9px] font-bold uppercase" style="color:var(--muted);">${e.exam}</span></div>
            </div>
            <span class="font-extrabold font-mono-num" style="color:var(--ink);">${e.xp} XP</span>
          </div>`).join("")}
        </div>
      </div>

      <div class="space-y-6">
        <div class="card p-6">
          <h2 class="font-display text-base font-semibold mb-4" style="color:var(--ink);">🎖 Your Badges</h2>
          ${p.badges.length === 0 ? `<p class="text-xs" style="color:var(--muted);">No badges unlocked yet. Complete a mock test to earn your first badge!</p>` : `
          <div class="space-y-2">
            ${p.badges.map(bid => {
              const b = BADGES[bid]; if (!b) return "";
              return `<div class="p-3 rounded-xl flex items-center gap-3 tag-marigold">
                <span class="text-xl">${b.icon}</span>
                <div><h4 class="text-xs font-bold">${b.title}</h4><p class="text-[10px]">${b.desc}</p></div>
              </div>`;
            }).join("")}
          </div>`}
        </div>
        <div class="card p-6">
          <h2 class="font-display text-base font-semibold mb-3" style="color:var(--ink);">🔗 Your Referral Code</h2>
          <div class="p-3 font-mono-num text-center rounded-xl font-bold tracking-widest" style="background:var(--navy); color:#fdf9f0;">${p.referralCode}</div>
          <p class="text-[10px] mt-2" style="color:var(--muted);">Share this code with friends to earn bonus rewards.</p>
        </div>
      </div>
    </div>
  </div>`;
}
function attachRewardsEvents() {}

// ---------- Init ----------
root.innerHTML = `<div class="min-h-screen flex items-center justify-center" style="background:var(--paper);"><p class="text-sm font-semibold" style="color:var(--muted);">Loading PrepArena…</p></div>`;
loadTestsData().then(render);
</script>
